<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CodeXcel AI</title>
    <link rel="stylesheet" href="landing.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Sora:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem 2rem;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }
        .btn-primary { width: 100%; margin-top: 1.5rem; }
        .auth-link { color: var(--text-muted); font-size: 0.9rem; margin-top: 1rem; display: block; }
        .auth-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="glass-card auth-card">
        <a href="/" class="logo" style="justify-content:center; margin-bottom: 2rem;"><i class="fas fa-terminal"></i>Code<span>Xcel</span></a>
        <h2>Welcome Back</h2>
        <p style="color:var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Login to manage your business AI.</p>
        
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-primary" id="loginBtn">Log In</button>
        </form>
        <div id="errorMsg" style="color: #ef4444; font-size: 0.85rem; margin-top: 1rem; display: none;"></div>
        
        <span class="auth-link">Don't have an account? <a href="/signup">Sign up</a></span>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            btn.disabled = true;
            err.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/dashboard';
                } else {
                    err.innerText = data.error;
                    err.style.display = 'block';
                }
            } catch(e) {
                err.innerText = 'Network error.';
                err.style.display = 'block';
            } finally {
                btn.innerHTML = 'Log In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
